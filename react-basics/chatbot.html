<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
    <style>
      body {
        font-family: Arial;
        margin-top: 0px;
        margin-bottom: 0px;
      }
      .send-button {
        background-color: rgb(25, 135, 84);
        color: white;
        padding: 12px 20px;
        margin-left : 10px;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        cursor: pointer;
      }
      .chat-input {
        border-radius: 10px;
        padding: 12px 15px;
        border-width: 1px;
        font-size: 15px;
        flex-grow: 1;
      }
      .chat-input-container {
        display: flex;
        margin-bottom: 60px;
      }
      .app-container {
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .chat-message-user {
        display: flex;
        justify-content: end;
        align-items: start;
      }
      .chat-message-robot {
        justify-content: start;
        display: flex;
        align-items: start;
      }
      .chat-message-text{
        background-color: rgba(238, 238, 238);
        padding: 15px 20px;
        border-radius: 10px;
        margin-left: 10px;
        margin-right: 10px;
        margin-bottom: 20px;
        max-width: 300px;
      }
      .chat-message-profile {
        width: 50px;
        height: 50px;
        border-radius: 50%;
      }
      .chat-messages-container {
        flex-grow: 1;
        margin-top: 20px;
        overflow: scroll;
        scrollbar-width: none; /* Firefox */
      }
    </style>  
  </head>
  <body>
    <div class="js-container"></div>
    <script src="reatc-basics.js"></script>
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function ChatInput({ chatMessages, setChatMessages }) {
        const [inputText, setInputText] = React.useState("");

        function saveInputText (event) {
          setInputText(event.target.value);
        }

        function sendMessage() {
          const newChatMessages = [
            ...chatMessages, 
            { message: inputText, sender: "user", id: crypto.randomUUID() }
          ]
          setChatMessages(newChatMessages);

          const response = Chatbot.getResponse(inputText);
          setChatMessages([
            ...newChatMessages, 
            { message: response, sender: "robot", id: crypto.randomUUID() }
          ]);
          setInputText(''); 
        }
        return (
          <div className="chat-input-container"> 
            <input 
              placeholder="Type your message here..." 
              size="30"
              onChange={saveInputText}
              value={inputText}
              className="chat-input"
            />
            <button onClick={sendMessage} className="send-button">Send</button>
          </div>
        )
      }
      function ChatMessage ({message, sender}) {
       return (
        <div className={ sender === 'user' ? 'chat-message-user' : 'chat-message-robot' }>
          {sender === "robot" && (
            <img src="robot.png" className="chat-message-profile"/>
          )}
          <div className="chat-message-text">
            {message}
          </div>
          {sender === "user" && (
            <img src="user.png" className="chat-message-profile" />
          )}
        </div>
       )
        
      }

      function ChatMessages ({ chatMessages }) {
        const messagesEndRef = React.useRef(null);

        React.useEffect (()=> {
            const containerElem = messagesEndRef.current;
            if (containerElem) {
                containerElem.scrollTop = containerElem.scrollHeight;
            }
        }, [chatMessages]);
        return (
          <div className="chat-messages-container" ref={messagesEndRef}>
            {chatMessages.map((chatMessage) => {
            return (
              <ChatMessage 
                message = {chatMessage.message} 
                sender={chatMessage.sender}
                key={chatMessage.id}

              />
            );
          })}
          </div>
          
        )

      }
      function App() {
        const [chatMessages, setChatMessages] = React.useState([
        ]);
        return (
          <div className="app-container">
            
            <ChatMessages 
              chatMessages={chatMessages}
            />
            <ChatInput 
              chatMessages={chatMessages}
              setChatMessages={setChatMessages}
            />
          </div>
        );
      }
      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
